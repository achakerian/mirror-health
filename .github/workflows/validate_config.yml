name: Validate Config

on:
  pull_request:
    paths:
      - 'config/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate JSON config files
        run: python -c "import json, pathlib; [json.loads(f.read_text()) for f in pathlib.Path('config').glob('*.json')]"
