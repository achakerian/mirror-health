name: Inactive Mirror Re-probe

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:  # Manual trigger for testing

concurrency:
  group: mirror-health-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Run inactive check
        run: python -m src.main inactive

      - name: Commit and push results
        run: |
          git config user.name "mirror-health-bot"
          git config user.email "mirror-health-bot@users.noreply.github.com"
          cp data/mirror_state.json /tmp/mirror_state.json
          cp data/mirror_scores.json /tmp/mirror_scores.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/mirror_state.json data/mirror_state.json
          cp /tmp/mirror_scores.json data/mirror_scores.json
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): update mirror health [inactive_check]"
            git push
          fi
