name: Mirror Discovery

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly on Sunday at 03:00 UTC
  workflow_dispatch:  # Manual trigger for testing

concurrency:
  group: mirror-health-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Run discovery sweep
        run: python -m src.main discovery

      - name: Commit and push results
        run: |
          git config user.name "mirror-health-bot"
          git config user.email "mirror-health-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): update mirror health [discovery]"
            git pull --rebase -X theirs origin main
            git push
          fi
