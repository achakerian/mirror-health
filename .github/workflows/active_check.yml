name: Active Mirror Check

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:  # Manual trigger for testing

concurrency:
  group: mirror-health-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Run active check
        run: python -m src.main active

      - name: Commit and push results
        run: |
          git config user.name "mirror-health-bot"
          git config user.email "mirror-health-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(data): update mirror health [active_check]"
            git pull --rebase origin main
            git push
          fi
